name: Docker Validation

on:
  push:
    branches:
      - main
      - developer
      - staging

jobs:
  validate-container:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker
        uses: docker/setup-buildx-action@v2

      - name: Build and validate container
        run: |
          docker compose -f docker-compose.yaml up --build --exit-code-from app
